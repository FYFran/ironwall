name: Ironwall Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday 8am UTC

jobs:
  security-scan:
    name: Ironwall 8-Step Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.25'

      - name: Install Ironwall
        run: go install github.com/FYFran/ironwall/cmd/ironwall@latest

      - name: Install Optional Tools (Betterleaks + Grype)
        run: |
          # Betterleaks — MIT, 98.6% recall secret scanning
          curl -sSfL https://raw.githubusercontent.com/zricethezav/betterleaks/main/install.sh | sh
          # Syft + Grype — SBOM + CVE
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh

      - name: Run Ironwall 8-Step Audit
        run: |
          ironwall scan . --format sarif --output ironwall-results.sarif.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          sarif_file: ironwall-results.sarif.json
          category: ironwall

      - name: Upload Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ironwall-report
          path: |
            ironwall-results.sarif.json
            ironwall-report-*.md
          retention-days: 30
