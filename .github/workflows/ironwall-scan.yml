name: Ironwall Self-Audit

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

jobs:
  self-audit:
    name: Ironwall 8-Step Self-Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.25'

      - name: Build Ironwall
        run: go build -o ironwall ./cmd/ironwall/

      - name: Run Ironwall Self-Audit
        run: |
          ./ironwall scan . --no-color --format sarif --output ironwall-results.sarif.json || true
          ./ironwall scan . --no-color --format markdown --output ironwall-report.md || true

      - name: Upload SARIF to GitHub Code Scanning
        if: hashFiles('ironwall-results.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          sarif_file: ironwall-results.sarif.json
          category: ironwall

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ironwall-self-audit
          path: |
            ironwall-results.sarif.json
            ironwall-report.md
          retention-days: 7
